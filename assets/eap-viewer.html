<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; overflow: hidden; font-family: sans-serif; }
    #container { width: 100vw; height: 100vh; }
    #container svg { width: 100%; height: 100%; }
    #controls {
      position: fixed;
      bottom: 12px;
      right: 12px;
      display: flex;
      gap: 6px;
      z-index: 100;
    }
    #controls button {
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }
    #controls button:hover { background: #1b5e20; }
    #hint {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.55);
      color: #fff;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hint">Scroll para zoom · Arraste para mover</div>
  <div id="container"></div>
  <div id="controls">
    <button onclick="panZoom.zoomIn()" title="Zoom In">+</button>
    <button onclick="panZoom.zoomOut()" title="Zoom Out">−</button>
    <button onclick="panZoom.resetZoom(); panZoom.center();" title="Reset">⟳</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
  <script>
    var panZoom;
    fetch('MVP%20MeasureSoftGram-2026-04-25-194944.svg')
      .then(r => r.text())
      .then(svgText => {
        document.getElementById('container').innerHTML = svgText;
        var svg = document.querySelector('#container svg');
        svg.removeAttribute('width');
        svg.removeAttribute('height');
        svg.style.width = '100%';
        svg.style.height = '100%';
        panZoom = svgPanZoom(svg, {
          zoomEnabled: true,
          controlIconsEnabled: false,
          fit: true,
          center: true,
          minZoom: 0.05,
          maxZoom: 20,
          zoomScaleSensitivity: 0.3
        });
        setTimeout(function() {
          document.getElementById('hint').style.opacity = '0';
          document.getElementById('hint').style.transition = 'opacity 1s';
        }, 3000);
      });
  </script>
</body>
</html>
