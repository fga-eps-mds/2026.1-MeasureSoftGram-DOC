<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe Print','Bradley Hand','Comic Sans MS',cursive" style="background:#fbf6e9">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3a3226"/>
    </marker>
    <style>
      .ink{fill:none;stroke:#3a3226;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
      .inkThin{fill:none;stroke:#3a3226;stroke-width:1.8;stroke-linecap:round;}
      .lbl{fill:#3a3226;font-size:17px;}
      .lblSmall{fill:#3a3226;font-size:13px;}
      .box{fill:#fffdf5;stroke:#3a3226;stroke-width:2.5;}
      .accent1{fill:#f6e3b4;}
      .accent2{fill:#cfe8d8;}
      .accent3{fill:#f3c9c1;}
      .accent4{fill:#c9dcf3;}
      .dash{fill:none;stroke:#7a6f57;stroke-width:2;stroke-dasharray:6 5;stroke-linecap:round;}
      .title{fill:#3a3226;font-size:30px;font-weight:bold;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="800" fill="#fbf6e9"/>

  <text x="600" y="52" text-anchor="middle" class="title">MeasureSoftGram — Rich Picture (Visão Geral)</text>
  <path class="ink" d="M270,66 Q600,80 930,66" />

  <!-- Cloud: internet / IA -->
  <g>
    <path class="accent4" d="M955,90 c-18,-28 -62,-28 -75,-4 c-26,-6 -46,14 -40,36 c-22,6 -22,40 4,46 h150 c30,0 34,-40 6,-48 c10,-26 -14,-46 -45,-30 z" stroke="#3a3226" stroke-width="2.5"/>
    <text x="960" y="118" text-anchor="middle" class="lbl">Claude / Agentes de IA</text>
    <!-- speech bubble -->
    <path class="box" d="M900,128 h120 a8,8 0 0 1 8,8 v28 a8,8 0 0 1 -8,8 h-55 l-14,16 l2,-16 h-53 a8,8 0 0 1 -8,-8 v-28 a8,8 0 0 1 8,-8 z"/>
    <text x="960" y="150" text-anchor="middle" class="lblSmall">"qual o TSQMI</text>
    <text x="960" y="165" text-anchor="middle" class="lblSmall">do repositório X?"</text>
  </g>

  <!-- MCP server box -->
  <g>
    <rect x="905" y="230" width="150" height="66" rx="10" class="box"/>
    <rect x="918" y="242" width="30" height="20" rx="3" fill="#f6e3b4" stroke="#3a3226" stroke-width="1.6"/>
    <circle cx="933" cy="252" r="2.4" fill="#3a3226"/>
    <text x="980" y="256" class="lblSmall">MCP Server</text>
    <text x="980" y="272" class="lblSmall">(protocolo MCP</text>
    <text x="980" y="286" class="lblSmall">HTTP/stdio-proxy)</text>
  </g>
  <path class="ink" d="M962,196 q6,20 -2,34" marker-end="url(#arrow)"/>
  <text x="985" y="212" class="lblSmall">MCP</text>

  <!-- Developer with VS Code -->
  <g id="dev-vscode">
    <circle cx="110" cy="120" r="16" class="ink"/>
    <path class="ink" d="M110,136 v34 M92,150 h36 M110,170 l-16,26 M110,170 l16,26"/>
    <rect x="150" y="118" width="86" height="58" rx="6" class="box"/>
    <path d="M158,126 l30,22 l-30,22 z" fill="#c9dcf3" stroke="#3a3226" stroke-width="1.6"/>
    <text x="193" y="188" text-anchor="middle" class="lblSmall">VS Code</text>
    <text x="193" y="202" text-anchor="middle" class="lblSmall">+ Plugin MSG</text>
  </g>
  <text x="60" y="200" class="lblSmall">Dev. usando o editor</text>

  <!-- Developer with laptop / CLI -->
  <g id="dev-cli">
    <circle cx="110" cy="330" r="16" class="ink"/>
    <path class="ink" d="M110,346 v34 M92,360 h36 M110,380 l-16,26 M110,380 l16,26"/>
    <path class="ink" d="M150,352 h70 v30 h-70 z M140,382 h90 l-6,10 h-78 z"/>
    <text x="185" y="371" text-anchor="middle" class="lblSmall" font-family="monospace">msgram &gt;_</text>
    <text x="60" y="420" class="lblSmall">Dev. rodando a CLI</text>
    <path class="dash" d="M150,367 q20,-2 30,0"/>
  </g>
  <text x="240" y="345" class="lblSmall" font-style="italic">roda 100% local —</text>
  <text x="240" y="362" class="lblSmall" font-style="italic">não fala com o Service</text>

  <!-- Gestor / usuario web -->
  <g id="user-web">
    <circle cx="110" cy="560" r="16" class="ink"/>
    <path class="ink" d="M110,576 v34 M92,590 h36 M110,610 l-16,26 M110,610 l16,26"/>
    <rect x="150" y="555" width="100" height="66" rx="4" class="box"/>
    <rect x="158" y="562" width="84" height="14" class="accent1" stroke="#3a3226" stroke-width="1.2"/>
    <path class="inkThin" d="M158,586 h50 M158,596 h70 M158,606 h40"/>
    <text x="200" y="638" text-anchor="middle" class="lblSmall">Gestor de Qualidade</text>
    <text x="200" y="652" text-anchor="middle" class="lblSmall">(Frontend Web)</text>
  </g>

  <!-- GitHub Action trigger -->
  <g id="gh-action">
    <rect x="60" y="700" width="150" height="60" rx="10" class="accent3" stroke="#3a3226" stroke-width="2.2"/>
    <circle cx="90" cy="722" r="10" class="ink"/>
    <path class="ink" d="M90,732 q-10,6 -6,16 M90,732 q10,6 6,16"/>
    <text x="150" y="724" text-anchor="middle" class="lblSmall">GitHub Action</text>
    <text x="150" y="740" text-anchor="middle" class="lblSmall">(dispara ao final</text>
    <text x="150" y="754" text-anchor="middle" class="lblSmall">do build de CI)</text>
  </g>

  <!-- Central gate: nginx -->
  <g id="gate">
    <path class="ink" d="M430,180 v520 M470,180 v520"/>
    <path class="ink" d="M430,180 q20,-16 40,0"/>
    <path class="ink" d="M430,700 q20,16 40,0"/>
    <path class="inkThin" d="M430,240 h40 M430,300 h40 M430,360 h40 M430,420 h40 M430,480 h40 M430,540 h40 M430,600 h40 M430,660 h40"/>
    <text x="450" y="150" text-anchor="middle" class="lbl">🚪 nginx</text>
    <text x="450" y="168" text-anchor="middle" class="lblSmall">(portão / reverse proxy)</text>
  </g>

  <!-- Arrows into the gate -->
  <path class="ink" d="M236,147 q100,10 180,20" marker-end="url(#arrow)"/>
  <path class="ink" d="M240,367 q100,10 180,3" marker-end="url(#arrow)"/>
  <path class="ink" d="M250,588 q90,10 170,3" marker-end="url(#arrow)"/>
  <path class="ink" d="M210,730 q120,-90 210,-360" marker-end="url(#arrow)"/>

  <!-- MCP to gate -->
  <path class="ink" d="M905,270 q-200,60 -395,120" marker-end="url(#arrow)"/>

  <!-- Service box behind the gate -->
  <g id="service">
    <rect x="530" y="260" width="200" height="130" rx="12" class="accent2" stroke="#3a3226" stroke-width="2.5"/>
    <text x="630" y="300" text-anchor="middle" class="lbl">MeasureSoftGram</text>
    <text x="630" y="322" text-anchor="middle" class="lbl">Service</text>
    <text x="630" y="342" text-anchor="middle" class="lblSmall">(Django, in-process com</text>
    <text x="630" y="358" text-anchor="middle" class="lblSmall">Core e math model embutidos)</text>
    <path class="ink" d="M480,325 h40" marker-end="url(#arrow)"/>
  </g>

  <!-- Postgres cylinder -->
  <g id="db">
    <path class="box" d="M600,430 a60,14 0 1 0 120,0 v70 a60,14 0 1 1 -120,0 z"/>
    <ellipse cx="660" cy="430" rx="60" ry="14" class="box"/>
    <text x="660" y="475" text-anchor="middle" class="lblSmall">PostgreSQL 18</text>
    <path class="ink" d="M630,390 v34" marker-end="url(#arrow)"/>
  </g>

  <!-- Front box behind gate -->
  <g id="front">
    <rect x="530" y="600" width="200" height="90" rx="12" class="accent4" stroke="#3a3226" stroke-width="2.5"/>
    <text x="630" y="635" text-anchor="middle" class="lbl">Frontend Web</text>
    <text x="630" y="656" text-anchor="middle" class="lblSmall">(Next.js / React)</text>
    <path class="ink" d="M480,637 q30,10 50,0" marker-end="url(#arrow)"/>
  </g>

  <!-- Grafana panel -->
  <g id="grafana">
    <rect x="850" y="440" width="210" height="150" rx="12" class="box"/>
    <text x="955" y="465" text-anchor="middle" class="lbl">Grafana</text>
    <rect x="868" y="480" width="34" height="60" fill="#f3c9c1" stroke="#3a3226" stroke-width="1.4"/>
    <rect x="908" y="500" width="34" height="40" fill="#f6e3b4" stroke="#3a3226" stroke-width="1.4"/>
    <rect x="948" y="470" width="34" height="70" fill="#cfe8d8" stroke="#3a3226" stroke-width="1.4"/>
    <path class="inkThin" d="M990,530 l16,-26 l14,14 l20,-34" />
    <text x="955" y="572" text-anchor="middle" class="lblSmall">dashboards de qualidade</text>
    <text x="955" y="586" text-anchor="middle" class="lblSmall">(consulta o Postgres direto)</text>
  </g>
  <path class="ink" d="M660,500 q90,20 190,0" marker-end="url(#arrow)"/>
  <text x="760" y="490" class="lblSmall">SQL direto</text>

  <path class="ink" d="M730,320 q70,20 120,110" marker-end="url(#arrow)"/>
  <text x="800" y="345" class="lblSmall">grafana_proxy</text>
  <text x="800" y="360" class="lblSmall">(autoriza + gera URL)</text>

  <!-- iframe dashed lines to front / vscode -->
  <path class="dash" d="M850,560 Q700,650 730,660"/>
  <text x="740" y="700" class="lblSmall" font-style="italic">iframe embutido</text>
  <path class="dash" d="M905,285 Q500,60 236,150"/>

  <!-- Action to service -->
  <path class="ink" d="M210,715 Q400,650 530,340" marker-end="url(#arrow)"/>
  <text x="330" y="600" class="lblSmall">HTTPS (dados de qualidade)</text>

</svg>
